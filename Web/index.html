<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UE Project Intelligence</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --panel: #ffffff;
      --panel-alt: #eef1f4;
      --text: #1f252b;
      --muted: #64707d;
      --line: #d7dde3;
      --accent: #1f6feb;
      --good: #198754;
      --warn: #b7791f;
      --bad: #b42318;
      --chip: #e8f0fe;
      --radius: 6px;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.4;
    }
    button, input, select {
      font: inherit;
    }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: var(--radius);
      padding: 6px 10px;
      min-height: 32px;
      cursor: pointer;
    }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    button:disabled {
      color: var(--muted);
      cursor: default;
    }
    input, select {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      min-height: 32px;
      padding: 5px 8px;
      width: 100%;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .topbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(220px, 360px) minmax(120px, 180px) auto auto;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .brand-title {
      font-weight: 650;
      white-space: nowrap;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      color: var(--muted);
      background: var(--panel-alt);
      max-width: 34vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 360px) 1fr minmax(280px, 380px);
      min-height: 0;
    }
    aside, main {
      min-height: 0;
    }
    .sidebar, .inspector {
      background: var(--panel);
      border-right: 1px solid var(--line);
      overflow: auto;
    }
    .inspector {
      border-right: 0;
      border-left: 1px solid var(--line);
    }
    .section {
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }
    .section h2, .section h3 {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 650;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 8px;
      background: #fff;
      min-width: 0;
    }
    .metric-value {
      display: block;
      font-size: 18px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .metric-label {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }
    .filters {
      display: grid;
      gap: 8px;
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .row > * { min-width: 0; }
    .list {
      display: grid;
      gap: 6px;
    }
    .item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 8px;
      cursor: pointer;
    }
    .item:hover, .item.selected {
      border-color: var(--accent);
      background: #f7fbff;
    }
    .item-title {
      font-weight: 650;
      overflow-wrap: anywhere;
    }
    .item-meta {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .tabs {
      display: flex;
      gap: 6px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      overflow-x: auto;
    }
    .tabs button {
      white-space: nowrap;
      background: var(--panel-alt);
    }
    .tabs button.active {
      background: #fff;
      color: var(--accent);
      border-color: var(--accent);
    }
    .workspace {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .view {
      min-height: 0;
      overflow: auto;
      padding: 12px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .graph-wrap {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      height: min(68vh, 760px);
      min-height: 420px;
      overflow: hidden;
    }
    svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .node rect {
      fill: #fff;
      stroke: #6b7785;
      rx: 5;
      ry: 5;
    }
    .node.asset rect { stroke: var(--accent); }
    .node.blueprint_node rect, .node.blueprint_graph rect { stroke: #7c3aed; }
    .node.data_table rect, .node.data_table_row rect { stroke: var(--good); }
    .node.animation_sequence rect, .node.skeleton rect, .node.skeletal_mesh rect { stroke: var(--warn); }
    .edge {
      stroke: #8b96a3;
      stroke-width: 1.2;
      marker-end: url(#arrow);
    }
    .edge.derived {
      stroke-dasharray: 5 3;
    }
    .edge-label {
      fill: var(--muted);
      font-size: 10px;
    }
    .node text {
      fill: var(--text);
      font-size: 11px;
      pointer-events: none;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .table th, .table td {
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid var(--line);
      padding: 7px 8px;
      overflow-wrap: anywhere;
    }
    .table th {
      background: var(--panel-alt);
      font-weight: 650;
      color: #313941;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      max-height: 360px;
      overflow: auto;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      border-radius: 999px;
      background: var(--chip);
      color: #244b87;
      padding: 3px 8px;
      font-size: 12px;
    }
    .notice {
      border-left: 3px solid var(--accent);
      background: #fff;
      padding: 8px 10px;
      margin-bottom: 10px;
      color: var(--muted);
    }
    .bad { color: var(--bad); }
    .good { color: var(--good); }
    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 300px 1fr;
      }
      .inspector {
        grid-column: 1 / -1;
        border-left: 0;
        border-top: 1px solid var(--line);
        max-height: 42vh;
      }
      .toolbar {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }
    }
    @media (max-width: 720px) {
      .topbar {
        grid-template-columns: 1fr;
      }
      .layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        max-height: 44vh;
      }
      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-title">UE Project Intelligence</div>
        <div id="status" class="status-pill">Disconnected</div>
      </div>
      <input id="apiBase" aria-label="API base">
      <input id="apiToken" aria-label="API token" placeholder="Token">
      <button id="connect" class="primary">Connect</button>
      <button id="refresh">Refresh</button>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <section class="section">
          <h2>Index</h2>
          <div class="summary-grid">
            <div class="metric"><span id="metricEntities" class="metric-value">0</span><span class="metric-label">Entities</span></div>
            <div class="metric"><span id="metricRelations" class="metric-value">0</span><span class="metric-label">Relations</span></div>
            <div class="metric"><span id="metricDiagnostics" class="metric-value">0</span><span class="metric-label">Diagnostics</span></div>
          </div>
        </section>
        <section class="section">
          <h2>Find</h2>
          <div class="filters">
            <input id="searchBox" placeholder="Search entities">
            <div class="row">
              <select id="kindFilter">
                <option value="asset">asset</option>
                <option value="blueprint_node">blueprint_node</option>
                <option value="blueprint_graph">blueprint_graph</option>
                <option value="data_table">data_table</option>
                <option value="data_table_row">data_table_row</option>
                <option value="animation_sequence">animation_sequence</option>
                <option value="skeleton">skeleton</option>
                <option value="">any kind</option>
              </select>
              <button id="runSearch">Search</button>
            </div>
          </div>
        </section>
        <section class="section">
          <h2>Entities</h2>
          <div id="entityList" class="list"></div>
          <button id="nextEntities" style="margin-top:8px;width:100%">Next Page</button>
        </section>
      </aside>

      <main class="workspace">
        <nav class="tabs" id="tabs">
          <button data-view="assets" class="active">Assets</button>
          <button data-view="graph">Project Graph</button>
          <button data-view="blueprint">Blueprint Flow</button>
          <button data-view="animation">Animation</button>
          <button data-view="data">DataTable</button>
          <button data-view="diff">Diff</button>
          <button data-view="coverage">Diagnostics</button>
        </nav>
        <section id="view" class="view"></section>
      </main>

      <aside class="inspector">
        <section class="section">
          <h2>Inspector</h2>
          <div id="inspector">Select an entity.</div>
        </section>
        <section class="section">
          <h2>Relations</h2>
          <div id="relations" class="list"></div>
        </section>
      </aside>
    </div>
  </div>

  <script>
    const state = {
      apiBase: location.protocol.startsWith("http") ? `${location.origin}/v1` : "http://127.0.0.1:8765/v1",
      apiToken: "",
      summary: null,
      scans: [],
      entities: [],
      nextCursor: null,
      selected: null,
      view: "assets"
    };

    const $ = (id) => document.getElementById(id);
    const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    const short = (value, n = 72) => {
      const text = String(value ?? "");
      return text.length > n ? `${text.slice(0, n - 1)}...` : text;
    };

    function setStatus(text, kind = "") {
      $("status").textContent = text;
      $("status").className = `status-pill ${kind}`;
    }

    async function api(path, options = {}) {
      const requestOptions = { ...options, headers: { ...(options.headers || {}) } };
      if (state.apiToken) {
        requestOptions.headers.Authorization = `Bearer ${state.apiToken}`;
      }
      const response = await fetch(`${state.apiBase}${path}`, requestOptions);
      if (!response.ok) {
        const text = await response.text();
        throw new Error(`${response.status} ${text}`);
      }
      const type = response.headers.get("content-type") || "";
      return type.includes("json") ? response.json() : response.text();
    }

    async function connect() {
      state.apiBase = $("apiBase").value.replace(/\/$/, "");
      state.apiToken = $("apiToken").value.trim();
      setStatus("Connecting");
      const health = await api("/health");
      state.health = health;
      await refreshAll();
      setStatus(`Connected ${health.db_path}`, "good");
    }

    async function refreshAll() {
      state.summary = await api("/summary");
      state.scans = (await api("/scans?limit=20")).items || [];
      $("metricEntities").textContent = state.summary.entity_count ?? 0;
      $("metricRelations").textContent = state.summary.relation_count ?? 0;
      $("metricDiagnostics").textContent = state.summary.diagnostic_count ?? 0;
      await loadEntities(true);
      await renderView();
    }

    async function loadEntities(reset = false) {
      if (reset) {
        state.entities = [];
        state.nextCursor = null;
      }
      const kind = $("kindFilter").value;
      const cursor = state.nextCursor ? `&cursor=${encodeURIComponent(state.nextCursor)}` : "";
      const url = `/entities?limit=50${kind ? `&kind=${encodeURIComponent(kind)}` : ""}${cursor}`;
      const result = await api(url);
      state.entities.push(...(result.items || []));
      state.nextCursor = result.next_cursor;
      $("nextEntities").disabled = !state.nextCursor;
      renderEntityList();
    }

    async function runSearch() {
      const query = $("searchBox").value.trim();
      if (!query) {
        await loadEntities(true);
        return;
      }
      state.entities = await api(`/search?q=${encodeURIComponent(query)}&limit=50`);
      state.nextCursor = null;
      $("nextEntities").disabled = true;
      renderEntityList();
    }

    function renderEntityList() {
      $("entityList").innerHTML = state.entities.map((entity) => `
        <div class="item ${state.selected?.id === entity.id ? "selected" : ""}" data-entity="${esc(entity.id)}">
          <div class="item-title">${esc(entity.display_name || entity.canonical_key)}</div>
          <div class="item-meta">${esc(entity.kind)} · ${esc(short(entity.canonical_key, 96))}</div>
        </div>
      `).join("");
      document.querySelectorAll("[data-entity]").forEach((node) => {
        node.addEventListener("click", () => selectEntity(node.getAttribute("data-entity")));
      });
    }

    async function selectEntity(id) {
      state.selected = state.entities.find((entity) => entity.id === id) || state.selected;
      renderEntityList();
      renderInspector();
      await loadRelations();
      await renderView();
    }

    async function loadRelations() {
      if (!state.selected) return;
      const result = await api(`/related?entity=${encodeURIComponent(state.selected.id)}&limit=40`);
      $("relations").innerHTML = (result.relations || []).map((rel) => `
        <div class="item">
          <div class="item-title">${esc(rel.type)}</div>
          <div class="item-meta">${esc(rel.direction)} · ${esc(short(rel.from_key || rel.from_id, 80))} -> ${esc(short(rel.to_key || rel.to_id, 80))}</div>
        </div>
      `).join("") || `<div class="item-meta">No direct relations.</div>`;
    }

    function renderInspector() {
      if (!state.selected) {
        $("inspector").innerHTML = "Select an entity.";
        return;
      }
      const entity = state.selected;
      const objectPath = entity.attributes?.object_path || entity.canonical_key;
      $("inspector").innerHTML = `
        <div class="item-title">${esc(entity.display_name || entity.canonical_key)}</div>
        <div class="item-meta">${esc(entity.kind)}</div>
        <div class="chips" style="margin:8px 0">
          <span class="chip">${esc(entity.source_layer)}</span>
          <span class="chip">${esc(entity.id.slice(0, 12))}</span>
        </div>
        <div class="row" style="margin-bottom:8px">
          <button id="copyPath">Copy Path</button>
          <a href="uepi://asset/${encodeURIComponent(objectPath)}"><button>Asset Link</button></a>
        </div>
        <pre>${esc(JSON.stringify(entity, null, 2))}</pre>
      `;
      $("copyPath").addEventListener("click", async () => {
        await navigator.clipboard?.writeText(objectPath);
      });
    }

    async function renderView() {
      const view = state.view;
      document.querySelectorAll("#tabs button").forEach((button) => button.classList.toggle("active", button.dataset.view === view));
      if (view === "assets") return renderAssetsView();
      if (view === "graph") return renderGraphView("asset_reference,contains_asset,depends_on_package,config_references_asset");
      if (view === "blueprint") return renderGraphView("contains_graph,contains_node,has_pin,connects_to,exec_flows_to,data_flows_to,delegate_flows_to");
      if (view === "animation") return renderKindTable("Animation", ["animation_sequence", "skeleton", "skeletal_mesh", "anim_blueprint", "anim_state_machine", "anim_state"]);
      if (view === "data") return renderKindTable("DataTable", ["data_table", "data_table_column", "data_table_row"]);
      if (view === "diff") return renderDiffView();
      if (view === "coverage") return renderCoverageView();
    }

    function renderAssetsView() {
      $("view").innerHTML = `
        <div class="notice">Select an asset to inspect direct relations, revision history, and graph neighborhoods.</div>
        <table class="table">
          <thead><tr><th>Name</th><th>Class</th><th>Package</th><th>Path</th></tr></thead>
          <tbody>${state.entities.map((entity) => `
            <tr>
              <td>${esc(entity.display_name)}</td>
              <td>${esc(entity.attributes?.asset_class_path || entity.kind)}</td>
              <td>${esc(entity.attributes?.package_name || "")}</td>
              <td>${esc(entity.attributes?.object_path || entity.canonical_key)}</td>
            </tr>
          `).join("")}</tbody>
        </table>
      `;
    }

    async function renderGraphView(defaultRelations) {
      const root = state.selected?.id || state.entities[0]?.id;
      $("view").innerHTML = `
        <div class="toolbar">
          <input id="graphRoot" value="${esc(root || "")}" placeholder="Root entity id or canonical key">
          <input id="graphRelations" value="${esc(defaultRelations)}" placeholder="relation_type list">
          <select id="graphDepth"><option>1</option><option selected>2</option><option>3</option></select>
          <button id="loadGraph" class="primary">Load Graph</button>
        </div>
        <div class="graph-wrap"><svg id="graphSvg" role="img"></svg></div>
      `;
      $("loadGraph").addEventListener("click", loadGraphFromInputs);
      await loadGraphFromInputs();
    }

    async function loadGraphFromInputs() {
      const root = $("graphRoot").value.trim();
      if (!root) return;
      const relations = $("graphRelations").value.split(",").map((item) => item.trim()).filter(Boolean);
      const relationQuery = relations.map((type) => `relation_type=${encodeURIComponent(type)}`).join("&");
      const graph = await api(`/subgraph?entity=${encodeURIComponent(root)}&depth=${$("graphDepth").value}&limit=220${relationQuery ? `&${relationQuery}` : ""}`);
      drawGraph(graph);
    }

    function drawGraph(graph) {
      const svg = $("graphSvg");
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 560;
      const cx = width / 2;
      const cy = height / 2;
      const radius = Math.max(120, Math.min(width, height) / 2 - 80);
      const nodes = graph.nodes || [];
      const nodeById = new Map(nodes.map((node, index) => {
        const angle = nodes.length <= 1 ? 0 : (Math.PI * 2 * index) / nodes.length;
        const depthBias = node.id === graph.root?.id ? 0 : 1;
        return [node.id, { ...node, x: cx + Math.cos(angle) * radius * depthBias, y: cy + Math.sin(angle) * radius * depthBias }];
      }));
      if (graph.root && nodeById.has(graph.root.id)) {
        nodeById.get(graph.root.id).x = cx;
        nodeById.get(graph.root.id).y = cy;
      }
      const edges = (graph.edges || []).filter((edge) => nodeById.has(edge.from_id) && nodeById.has(edge.to_id));
      svg.innerHTML = `
        <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#8b96a3"></path></marker></defs>
        ${edges.map((edge) => {
          const from = nodeById.get(edge.from_id);
          const to = nodeById.get(edge.to_id);
          const mx = (from.x + to.x) / 2;
          const my = (from.y + to.y) / 2;
          return `<line class="edge ${edge.derived ? "derived" : ""}" x1="${from.x}" y1="${from.y}" x2="${to.x}" y2="${to.y}"></line><text class="edge-label" x="${mx}" y="${my}">${esc(short(edge.type, 22))}</text>`;
        }).join("")}
        ${[...nodeById.values()].map((node) => {
          const label = short(node.display_name || node.canonical_key, 26);
          return `<g class="node ${esc(node.kind)}" transform="translate(${node.x - 70},${node.y - 24})"><rect width="140" height="48"></rect><text x="8" y="19">${esc(label)}</text><text x="8" y="36">${esc(short(node.kind, 24))}</text></g>`;
        }).join("")}
      `;
    }

    async function renderKindTable(title, kinds) {
      const groups = [];
      for (const kind of kinds) {
        try {
          const result = await api(`/entities?kind=${encodeURIComponent(kind)}&limit=80`);
          groups.push({ kind, items: result.items || [] });
        } catch (err) {
          groups.push({ kind, items: [], error: err.message });
        }
      }
      $("view").innerHTML = `<h2>${esc(title)}</h2>` + groups.map((group) => `
        <h3>${esc(group.kind)} <span class="item-meta">${group.items.length}</span></h3>
        <table class="table">
          <thead><tr><th>Name</th><th>Key</th><th>Attributes</th></tr></thead>
          <tbody>${group.items.map((entity) => `
            <tr><td>${esc(entity.display_name)}</td><td>${esc(entity.canonical_key)}</td><td><pre>${esc(JSON.stringify(entity.attributes || {}, null, 2))}</pre></td></tr>
          `).join("") || `<tr><td colspan="3" class="item-meta">No rows.</td></tr>`}</tbody>
        </table>
      `).join("");
    }

    async function renderDiffView() {
      const stale = await api("/stale?limit=20").catch((err) => ({ error: err.message }));
      const report = await api("/report?limit=12").catch((err) => err.message);
      const diff = await api("/diff?limit=20").catch((err) => ({ error: err.message }));
      $("view").innerHTML = `
        <div class="toolbar">
          <button id="reloadDiff" class="primary">Reload</button>
        </div>
        <h2>Stale</h2><pre>${esc(JSON.stringify(stale, null, 2))}</pre>
        <h2>Diff</h2><pre>${esc(JSON.stringify(diff, null, 2))}</pre>
        <h2>Report</h2><pre>${esc(report)}</pre>
      `;
      $("reloadDiff").addEventListener("click", renderDiffView);
    }

    function renderCoverageView() {
      const relationTypes = state.summary?.relation_types || {};
      $("view").innerHTML = `
        <h2>Diagnostics and Coverage</h2>
        <div class="summary-grid" style="margin-bottom:10px">
          <div class="metric"><span class="metric-value">${esc(state.summary?.asset_revisions?.total_count || 0)}</span><span class="metric-label">Revisions</span></div>
          <div class="metric"><span class="metric-value">${esc(Object.keys(relationTypes).length)}</span><span class="metric-label">Relation Types</span></div>
          <div class="metric"><span class="metric-value">${esc(state.summary?.package_stale?.stale_count || 0)}</span><span class="metric-label">Stale Packages</span></div>
        </div>
        <table class="table">
          <thead><tr><th>Relation Type</th><th>Count</th></tr></thead>
          <tbody>${Object.entries(relationTypes).map(([type, count]) => `<tr><td>${esc(type)}</td><td>${esc(count)}</td></tr>`).join("")}</tbody>
        </table>
        <h2>Summary JSON</h2>
        <pre>${esc(JSON.stringify(state.summary || {}, null, 2))}</pre>
      `;
    }

    $("apiBase").value = state.apiBase;
    $("connect").addEventListener("click", () => connect().catch((err) => setStatus(err.message, "bad")));
    $("refresh").addEventListener("click", () => refreshAll().catch((err) => setStatus(err.message, "bad")));
    $("runSearch").addEventListener("click", () => runSearch().catch((err) => setStatus(err.message, "bad")));
    $("nextEntities").addEventListener("click", () => loadEntities(false).catch((err) => setStatus(err.message, "bad")));
    $("tabs").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-view]");
      if (!button) return;
      state.view = button.dataset.view;
      renderView().catch((err) => setStatus(err.message, "bad"));
    });
    connect().catch((err) => setStatus(err.message, "bad"));
  </script>
</body>
</html>
