# Copy this block into .codex/config.toml in a trusted Unreal project.
# Replace the placeholders before running Codex.

[mcp_servers.uepi]
command = "<PYTHON_EXE>"
args = [
  "-B",
  "<PROJECT_ROOT>/Plugins/UEProjectIntelligence/Services/uepi/src/uepi/mcp_server.py",
  "--project",
  "<PROJECT_ROOT>/<PROJECT_NAME>.uproject",
  "--tool-profile",
  "codex",
]
cwd = "<PROJECT_ROOT>"
startup_timeout_sec = 20
tool_timeout_sec = 60
default_tools_approval_mode = "auto"
enabled = true

