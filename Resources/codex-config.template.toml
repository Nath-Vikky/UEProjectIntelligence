# Copy this block into .codex/config.toml in a trusted Unreal project.
# Replace every __PLACEHOLDER__ before running Codex.
# The single codex profile exposes read tools plus safe edit-planning/apply tools.
# Edit apply still requires the editor live bridge, edit_preview, explicit user approval, validation, and diff reporting.
# Online UEPI editor sessions are preferred for live reads/edits; this --project path is the offline Snapshot fallback.

[mcp_servers.uepi]
command = "__PYTHON_EXE__"
args = [
  "-B",
  "__PROJECT_ROOT__/Plugins/UEProjectIntelligence/Services/uepi/src/uepi/mcp_server.py",
  "--project",
  "__PROJECT_ROOT__/__PROJECT_NAME__.uproject",
  "--tool-profile",
  "codex",
]
cwd = "__PROJECT_ROOT__"
startup_timeout_sec = 20
tool_timeout_sec = 60
required = false
enabled = true

# Optional: restrict tools during early testing.
# enabled_tools = [
#   "uepi_status",
#   "uepi_overview",
#   "uepi_search",
#   "uepi_context",
#   "uepi_asset",
#   "uepi_blueprint",
#   "uepi_impact",
# ]

# Legacy note: codex_write_alpha remains accepted as an alias, but new installs should use only this single server block.
